name: Build NovaBrowser IPA & TIPA

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build IPA
    runs-on: macos-14
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Select Xcode version
      run: |
        sudo xcode-select -s /Applications/Xcode_15.4.app || sudo xcode-select -s /Applications/Xcode_15.3.app || sudo xcode-select -s /Applications/Xcode.app
        xcodebuild -version
        swift --version

    - name: Generate App Icon
      run: |
        # Generate a simple app icon using Swift
        cat > /tmp/generate_icon.swift << 'ICONEOF'
        import Foundation
        import CoreGraphics
        import ImageIO
        import UniformTypeIdentifiers

        func createAppIcon(size: Int, outputPath: String) {
            let colorSpace = CGColorSpaceCreateDeviceRGB()
            guard let context = CGContext(
                data: nil,
                width: size,
                height: size,
                bitsPerComponent: 8,
                bytesPerRow: size * 4,
                space: colorSpace,
                bitmapInfo: CGImageAlphaInfo.premultipliedLast.rawValue
            ) else { return }
            
            // Background gradient - deep blue to purple
            let colors = [
                CGColor(red: 0.1, green: 0.1, blue: 0.9, alpha: 1.0),
                CGColor(red: 0.5, green: 0.1, blue: 0.8, alpha: 1.0),
                CGColor(red: 0.2, green: 0.7, blue: 0.9, alpha: 1.0)
            ] as CFArray
            
            let gradient = CGGradient(
                colorsSpace: colorSpace,
                colors: colors,
                locations: [0.0, 0.5, 1.0]
            )!
            
            // Draw rounded rect background
            let rect = CGRect(x: 0, y: 0, width: size, height: size)
            let cornerRadius = CGFloat(size) * 0.225
            let path = CGPath(roundedRect: rect, cornerWidth: cornerRadius, cornerHeight: cornerRadius, transform: nil)
            context.addPath(path)
            context.clip()
            
            context.drawLinearGradient(
                gradient,
                start: CGPoint(x: 0, y: CGFloat(size)),
                end: CGPoint(x: CGFloat(size), y: 0),
                options: []
            )
            
            // Draw globe circle
            let center = CGFloat(size) / 2.0
            let globeRadius = CGFloat(size) * 0.28
            
            context.setStrokeColor(CGColor(red: 1, green: 1, blue: 1, alpha: 0.9))
            context.setLineWidth(CGFloat(size) * 0.025)
            
            // Main circle
            context.strokeEllipse(in: CGRect(
                x: center - globeRadius,
                y: center - globeRadius,
                width: globeRadius * 2,
                height: globeRadius * 2
            ))
            
            // Horizontal line
            context.move(to: CGPoint(x: center - globeRadius, y: center))
            context.addLine(to: CGPoint(x: center + globeRadius, y: center))
            context.strokePath()
            
            // Vertical ellipse
            context.strokeEllipse(in: CGRect(
                x: center - globeRadius * 0.45,
                y: center - globeRadius,
                width: globeRadius * 0.9,
                height: globeRadius * 2
            ))
            
            // Top arc
            let arcY = center - globeRadius * 0.5
            context.move(to: CGPoint(x: center - globeRadius * 0.85, y: arcY))
            context.addQuadCurve(
                to: CGPoint(x: center + globeRadius * 0.85, y: arcY),
                control: CGPoint(x: center, y: arcY - globeRadius * 0.3)
            )
            context.strokePath()
            
            // Bottom arc
            let arcY2 = center + globeRadius * 0.5
            context.move(to: CGPoint(x: center - globeRadius * 0.85, y: arcY2))
            context.addQuadCurve(
                to: CGPoint(x: center + globeRadius * 0.85, y: arcY2),
                control: CGPoint(x: center, y: arcY2 + globeRadius * 0.3)
            )
            context.strokePath()
            
            guard let image = context.makeImage() else { return }
            
            let url = URL(fileURLWithPath: outputPath) as CFURL
            guard let dest = CGImageDestinationCreateWithURL(url, UTType.png.identifier as CFString, 1, nil) else { return }
            CGImageDestinationAddImage(dest, image, nil)
            CGImageDestinationFinalize(dest)
        }

        createAppIcon(size: 1024, outputPath: CommandLine.arguments[1])
        ICONEOF
        
        swift /tmp/generate_icon.swift NovaBrowser/Resources/Assets.xcassets/AppIcon.appiconset/AppIcon.png
        
        # Update Contents.json to reference the icon
        cat > NovaBrowser/Resources/Assets.xcassets/AppIcon.appiconset/Contents.json << 'EOF'
        {
          "images" : [
            {
              "filename" : "AppIcon.png",
              "idiom" : "universal",
              "platform" : "ios",
              "size" : "1024x1024"
            }
          ],
          "info" : {
            "author" : "xcode",
            "version" : 1
          }
        }
        EOF

    - name: Build for device (unsigned)
      run: |
        xcodebuild \
          -project NovaBrowser.xcodeproj \
          -scheme NovaBrowser \
          -configuration Release \
          -sdk iphoneos \
          -derivedDataPath build \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO \
          DEVELOPMENT_TEAM="" \
          AD_HOC_CODE_SIGNING_ALLOWED=YES \
          CODE_SIGN_ENTITLEMENTS="" \
          ONLY_ACTIVE_ARCH=NO \
          ARCHS="arm64" \
          IPHONEOS_DEPLOYMENT_TARGET=15.0 \
          PRODUCT_BUNDLE_IDENTIFIER=com.novabrowser.app \
          build

    - name: Create IPA
      run: |
        APP_PATH=$(find build -name "NovaBrowser.app" -type d | head -1)
        echo "Found app at: $APP_PATH"
        
        if [ -z "$APP_PATH" ]; then
          echo "ERROR: NovaBrowser.app not found!"
          find build -name "*.app" -type d
          exit 1
        fi
        
        # Create Payload directory
        mkdir -p Payload
        cp -r "$APP_PATH" Payload/
        
        # Inject entitlements for TrollStore
        cat > entitlements.plist << 'ENTEOF'
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
            <key>com.apple.developer.web-browser</key>
            <true/>
            <key>com.apple.security.network.client</key>
            <true/>
            <key>com.apple.security.network.server</key>
            <true/>
            <key>platform-application</key>
            <true/>
            <key>com.apple.private.security.no-sandbox</key>
            <true/>
            <key>com.apple.private.skip-library-validation</key>
            <true/>
        </dict>
        </plist>
        ENTEOF
        
        # Create standard IPA (unsigned - for sideloading tools)
        zip -r NovaBrowser.ipa Payload/
        echo "Standard IPA created: $(du -h NovaBrowser.ipa)"
        
        # Create TIPA (TrollStore IPA with entitlements)
        # Re-sign with ldid-style fakesign for TrollStore compatibility
        # TrollStore IPAs are just IPAs with specific entitlements embedded
        ldid -Sentitlements.plist "Payload/NovaBrowser.app/NovaBrowser" 2>/dev/null || true
        zip -r NovaBrowser.tipa Payload/
        echo "TrollStore IPA created: $(du -h NovaBrowser.tipa)"

    - name: Upload IPA artifact
      uses: actions/upload-artifact@v4
      with:
        name: NovaBrowser-IPA
        path: NovaBrowser.ipa
        retention-days: 90

    - name: Upload TIPA artifact
      uses: actions/upload-artifact@v4
      with:
        name: NovaBrowser-TIPA
        path: NovaBrowser.tipa
        retention-days: 90

    - name: Create Release (on tag push)
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: |
          NovaBrowser.ipa
          NovaBrowser.tipa
        generate_release_notes: true
        body: |
          ## NovaBrowser ${{ github.ref_name }}
          
          ### Downloads
          - **NovaBrowser.ipa** - Standard IPA for sideloading (AltStore, Sideloadly, etc.)
          - **NovaBrowser.tipa** - TrollStore IPA (install via TrollStore for permanent installation)
          
          ### Features
          - Blazing fast WebKit-based browser with CyberKit enhancement support
          - Built-in ad blocker with EasyList + EasyPrivacy filters
          - Full tab management with card-based tab switcher
          - Smart address bar with search suggestions
          - Bookmarks & folders with search
          - Full browsing history with sections
          - Download manager with pause/resume
          - Reader mode for articles
          - Force dark mode on any website
          - Private browsing mode
          - Find in page
          - Desktop site request
          - Customizable search engines (8 options)
          - Comprehensive settings panel
          - HTTPS upgrade
          - Context menus on links
          
          ### Requirements
          - iOS 15.0+ (standard features)
          - iOS 14.0+ (basic compatibility)
          - TrollStore for TIPA installation (iOS 14.0-17.0)
          
          ### CyberKit Integration
          On jailbroken devices, NovaBrowser automatically benefits from CyberKit's
          backported WebKit engine, bringing modern web standards to older iOS versions.
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-simulator:
    name: Build & Verify (Simulator)
    runs-on: macos-14
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Select Xcode
      run: |
        sudo xcode-select -s /Applications/Xcode_15.4.app || sudo xcode-select -s /Applications/Xcode_15.3.app || sudo xcode-select -s /Applications/Xcode.app
        xcodebuild -version

    - name: Build for simulator
      run: |
        xcodebuild \
          -project NovaBrowser.xcodeproj \
          -scheme NovaBrowser \
          -configuration Debug \
          -sdk iphonesimulator \
          -destination 'platform=iOS Simulator,name=iPhone 15 Pro,OS=latest' \
          -derivedDataPath build \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          ONLY_ACTIVE_ARCH=YES \
          build
        
        echo "Simulator build succeeded!"
